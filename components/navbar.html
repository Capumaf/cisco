<!-- ============================================
     NAVBAR (SHELL) — DS3 Comunicaciones
     Contenedor sticky que aloja header, mobile-header,
     mobile-menu y search-modal. No contiene contenido
     propio — solo estructura + comportamiento de scroll.
     Mismos IDs que espera nav.js, sin cambios.
============================================ -->

<nav
  id="main-navbar"
  class="sticky top-0 z-40 w-full bg-white/90 backdrop-blur-md border-b border-gray-100 transition-shadow duration-300"
>
  <div id="header-container"></div>
  <div id="mobile-header-container"></div>
</nav>

<div id="mobile-menu-container"></div>
<div id="search-modal-container"></div>

<!-- Progressive enhancement: agrega sombra sutil solo
     cuando hay scroll, sin tocar la lógica de nav.js -->
<script>
  (function () {
    var navbar = document.getElementById("main-navbar");
    if (!navbar) return;

    var lastState = false;

    function onScroll() {
      var scrolled = window.scrollY > 8;
      if (scrolled !== lastState) {
        navbar.classList.toggle("shadow-sm", scrolled);
        navbar.classList.toggle("border-transparent", scrolled);
        lastState = scrolled;
      }
    }

    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  })();
</script>
